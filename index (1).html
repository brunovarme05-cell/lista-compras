<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Compras">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras — Natural Life</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --paper: #111111;
    --ink: #d4c9a8;
    --ink-dim: #7a7060;
    --accent: #8aad6e;
    --accent-dim: #4a6640;
    --red: #c0624a;
    --border: #2a2820;
    --checked-bg: #161610;
    --glow: rgba(138, 173, 110, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Courier Prime', 'Courier New', monospace;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(138,173,110,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(138,173,110,0.03) 0%, transparent 50%);
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header::after {
    content: '';
    display: block;
    width: 60%;
    height: 1px;
    background: var(--border);
    margin: 4px auto 0;
  }

  .logo-line {
    font-family: 'Special Elite', cursive;
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Special Elite', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: var(--ink);
    letter-spacing: 0.05em;
    line-height: 1.2;
    text-shadow: 0 0 40px rgba(212, 201, 168, 0.1);
  }

  .subtitle {
    font-size: 0.78rem;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    margin-top: 0.5rem;
    font-style: italic;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .progress-label {
    font-size: 0.72rem;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    white-space: nowrap;
  }
  .progress-bar-bg {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-count {
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  /* SECTION */
  .section {
    margin-bottom: 2rem;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section:nth-child(2) { animation-delay: 0.05s; }
  .section:nth-child(3) { animation-delay: 0.10s; }
  .section:nth-child(4) { animation-delay: 0.15s; }
  .section:nth-child(5) { animation-delay: 0.20s; }
  .section:nth-child(6) { animation-delay: 0.25s; }
  .section:nth-child(7) { animation-delay: 0.30s; }
  .section:nth-child(8) { animation-delay: 0.35s; }
  .section:nth-child(9) { animation-delay: 0.40s; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 1rem;
    background: rgba(138,173,110,0.06);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: rgba(138,173,110,0.1); }

  .section-title {
    font-family: 'Special Elite', cursive;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .section-title .icon {
    font-size: 0.9rem;
    opacity: 0.8;
  }

  .section-meta {
    font-size: 0.68rem;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }

  .section-body { padding: 0.3rem 0; }

  /* ITEM */
  .item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid rgba(42,40,32,0.5);
    transition: background 0.2s;
    position: relative;
  }
  .item:last-child { border-bottom: none; }
  .item:hover { background: rgba(255,255,255,0.02); }

  .item.checked {
    background: var(--checked-bg);
  }
  .item.checked .item-label {
    color: var(--ink-dim);
    text-decoration: line-through;
    text-decoration-color: var(--accent-dim);
  }

  /* Custom checkbox */
  .cb-wrap {
    position: relative;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .cb-wrap input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    z-index: 2;
    margin: 0;
  }
  .cb-box {
    width: 18px;
    height: 18px;
    border: 1px solid var(--ink-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--accent);
    transition: border-color 0.2s, background 0.2s;
    background: transparent;
    font-family: 'Courier Prime', monospace;
  }
  .cb-wrap input:checked ~ .cb-box {
    border-color: var(--accent);
    background: rgba(138,173,110,0.12);
  }

  .item-label {
    font-size: 0.85rem;
    line-height: 1.4;
    flex: 1;
    color: var(--ink);
    letter-spacing: 0.02em;
    transition: color 0.2s;
  }

  .item-delete {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-dim);
    font-size: 0.8rem;
    padding: 2px 4px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    font-family: 'Courier Prime', monospace;
  }
  .item:hover .item-delete { opacity: 1; }
  .item-delete:hover { color: var(--red); }

  /* ADD ITEM */
  .add-row {
    display: flex;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-top: 1px dashed var(--border);
    margin-top: 0.2rem;
  }
  .add-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--ink);
    font-family: 'Courier Prime', monospace;
    font-size: 0.82rem;
    padding: 0.2rem 0.3rem;
    outline: none;
    letter-spacing: 0.03em;
  }
  .add-input::placeholder { color: var(--ink-dim); font-style: italic; }
  .add-input:focus { border-bottom-color: var(--accent); }

  .add-btn {
    background: none;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: 'Special Elite', cursive;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    padding: 0.2rem 0.7rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    text-transform: uppercase;
  }
  .add-btn:hover { background: rgba(138,173,110,0.12); border-color: var(--accent); }

  /* ACTIONS */
  .actions {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
  }
  .btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--ink-dim);
    font-family: 'Special Elite', cursive;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    padding: 0.45rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn:hover { border-color: var(--ink-dim); color: var(--ink); }
  .btn.primary {
    border-color: var(--accent-dim);
    color: var(--accent);
  }
  .btn.primary:hover { background: rgba(138,173,110,0.1); border-color: var(--accent); }
  .btn.danger { border-color: #3a2020; color: #7a4040; }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }

  /* FOOTER */
  .footer {
    text-align: center;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.7rem;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    font-style: italic;
  }
  .footer span { color: var(--accent); opacity: 0.7; }

  /* COLLAPSE arrow */
  .arrow {
    font-size: 0.65rem;
    color: var(--ink-dim);
    transition: transform 0.2s;
    display: inline-block;
  }
  .section.collapsed .arrow { transform: rotate(-90deg); }
  .section.collapsed .section-body,
  .section.collapsed .add-row { display: none; }

  /* Blinking cursor effect on title */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--accent);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1.1s step-end infinite;
    opacity: 0.7;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('SW registrado ✓'))
        .catch(e => console.warn('SW error:', e));
    });
  }

  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('installBanner');
    if (banner) banner.style.display = 'flex';
  });

  function installApp() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      const banner = document.getElementById('installBanner');
      if (banner) banner.style.display = 'none';
    });
  }

  window.addEventListener('appinstalled', () => {
    const banner = document.getElementById('installBanner');
    if (banner) banner.style.display = 'none';
  });
</script>
</head>
<body>
<div id="installBanner" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111111;border:1px solid #8aad6e;border-radius:8px;padding:12px 18px;gap:12px;align-items:center;z-index:9999;font-family:'Courier Prime',monospace;font-size:12px;color:#d4c9a8;box-shadow:0 4px 24px rgba(0,0,0,0.7);max-width:90vw;">
  <span style="color:#8aad6e;">↓</span>
  <span>Instalar en pantalla de inicio</span>
  <button onclick="installApp()" style="background:#8aad6e;border:none;color:#0a0a0a;font-family:'Courier Prime',monospace;font-size:11px;font-weight:700;padding:6px 12px;border-radius:4px;cursor:pointer;">Instalar</button>
  <button onclick="document.getElementById('installBanner').style.display='none'" style="background:none;border:none;color:#444;cursor:pointer;font-size:16px;line-height:1;">×</button>
</div>
<div class="container">

  <div class="header">
    <div class="logo-line">✦ Natural Life ✦</div>
    <h1>Lista de Compras<span class="cursor"></span></h1>
    <div class="subtitle">guía nutricional — plan alimenticio</div>
  </div>

  <div class="progress-wrap">
    <span class="progress-label">PROGRESO</span>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-count" id="progressCount">0 / 0</span>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="markAll(true)">[ marcar todo ]</button>
    <button class="btn" onclick="markAll(false)">[ desmarcar todo ]</button>
    <button class="btn danger" onclick="clearChecked()">[ eliminar marcados ]</button>
  </div>

  <div id="sections-container"></div>

  <div class="footer">
    <span>"La persona que quiere hacer algo siempre encuentra la manera."</span>
  </div>

</div>

<script>
const initialData = [
  {
    id: "proteinas",
    icon: "🥩",
    title: "Proteínas",
    items: [
      "Pechuga de pollo (sin piel)",
      "Lomo de cerdo / pulpa de cerdo",
      "Pescado (tilapia, salmón, merluza)",
      "Carne roja (máx. 1 vez/semana)",
      "Huevos (completos)",
      "Claras de huevo",
      "Jamón de pavo (bajo en sodio)",
      "Atún en agua (enlatado light)"
    ]
  },
  {
    id: "carbohidratos",
    icon: "🌾",
    title: "Carbohidratos",
    items: [
      "Avena en hojuelas",
      "Arroz integral",
      "Pan integral (tipo Bimbo integral)",
      "Tortilla integral",
      "Pasta integral",
      "Papa",
      "Plátano verde / maduro",
      "Torticas de arroz integral inflado"
    ]
  },
  {
    id: "frutas",
    icon: "🍎",
    title: "Frutas (permitidas)",
    items: [
      "Manzana verde",
      "Banano / cambur",
      "Papaya",
      "Melón",
      "Patilla / sandía",
      "Mango",
      "Durazno (x2)",
      "Kiwi (x2)",
      "Fresas (1 taza)"
    ]
  },
  {
    id: "verduras",
    icon: "🥦",
    title: "Verduras & Vegetales",
    items: [
      "Espinaca",
      "Brócoli",
      "Pepino",
      "Apio (tallos)",
      "Lechuga",
      "Tomate (sin cáscara)",
      "Zanahoria (sin cáscara)",
      "Pimentón verde",
      "Papa (sin cáscara)"
    ]
  },
  {
    id: "grasas",
    icon: "🥜",
    title: "Grasas buenas & Frutos secos",
    items: [
      "Mantequilla de maní (sin azúcar)",
      "Mantequilla de almendras",
      "Almendras (bolsa)",
      "Nueces",
      "Aguacate"
    ]
  },
  {
    id: "lacteos",
    icon: "🥛",
    title: "Lácteos permitidos",
    items: [
      "Leche deslactosada",
      "Leche de soya",
      "Leche de almendras",
      "Cuajada (queso fresco)"
    ]
  },
  {
    id: "bebidas",
    icon: "🍵",
    title: "Bebidas & Aromáticas",
    items: [
      "Aromáticas / infusiones (variadas)",
      "Té verde / té negro",
      "Avena en bebida",
      "Agua de coco (para jugo gastritis)",
      "Agua (2 litros diarios)"
    ]
  },
  {
    id: "condimentos",
    icon: "🧂",
    title: "Condimentos & Extras",
    items: [
      "Sal marina",
      "Ajo (cabezas)",
      "Hierbas aromáticas (romero, orégano, cilantro)",
      "Canela en polvo",
      "Splenda / endulzante sin calorías",
      "Gel de aloe vera / sábila (para jugo colitis)",
      "Gelatina light",
      "Piña (rodajas — jugo verde)"
    ]
  }
];

// Load state from localStorage or use initial data
let state = JSON.parse(localStorage.getItem('nlState') || 'null') || 
  initialData.map(s => ({
    ...s,
    collapsed: false,
    items: s.items.map(label => ({ label, checked: false }))
  }));

function save() {
  localStorage.setItem('nlState', JSON.stringify(state));
}

function render() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  state.forEach((section, si) => {
    const sec = document.createElement('div');
    sec.className = 'section' + (section.collapsed ? ' collapsed' : '');
    sec.style.animationDelay = (si * 0.05) + 's';

    const checkedCount = section.items.filter(i => i.checked).length;

    sec.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si})">
        <div class="section-title">
          <span class="icon">${section.icon}</span>
          ${section.title}
        </div>
        <div style="display:flex;align-items:center;gap:0.8rem">
          <span class="section-meta">${checkedCount}/${section.items.length}</span>
          <span class="arrow">▾</span>
        </div>
      </div>
      <div class="section-body" id="body-${si}">
        ${section.items.map((item, ii) => `
          <div class="item${item.checked ? ' checked' : ''}" id="item-${si}-${ii}">
            <label class="cb-wrap">
              <input type="checkbox" ${item.checked ? 'checked' : ''}
                onchange="toggleItem(${si}, ${ii}, this.checked)">
              <div class="cb-box">${item.checked ? 'X' : '&nbsp;'}</div>
            </label>
            <span class="item-label">${item.label}</span>
            <button class="item-delete" onclick="deleteItem(${si}, ${ii})" title="Eliminar">✕</button>
          </div>
        `).join('')}
      </div>
      <div class="add-row">
        <input class="add-input" type="text" placeholder="+ agregar ingrediente..."
          id="input-${si}" onkeydown="if(event.key==='Enter') addItem(${si})">
        <button class="add-btn" onclick="addItem(${si})">agregar</button>
      </div>
    `;
    container.appendChild(sec);
  });

  updateProgress();
}

function toggleItem(si, ii, checked) {
  state[si].items[ii].checked = checked;
  save();
  render();
}

function deleteItem(si, ii) {
  state[si].items.splice(ii, 1);
  save();
  render();
}

function addItem(si) {
  const input = document.getElementById('input-' + si);
  const val = input.value.trim();
  if (!val) return;
  state[si].items.push({ label: val, checked: false });
  save();
  render();
  // Restore focus
  setTimeout(() => {
    const newInput = document.getElementById('input-' + si);
    if (newInput) newInput.focus();
  }, 50);
}

function toggleSection(si) {
  state[si].collapsed = !state[si].collapsed;
  save();
  render();
}

function markAll(checked) {
  state.forEach(s => s.items.forEach(i => i.checked = checked));
  save();
  render();
}

function clearChecked() {
  state.forEach(s => s.items = s.items.filter(i => !i.checked));
  save();
  render();
}

function updateProgress() {
  const all = state.flatMap(s => s.items);
  const total = all.length;
  const done = all.filter(i => i.checked).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${done} / ${total}`;
}

render();
</script>
</body>
</html>
